<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" width="280" height="80">
  <defs>
    <clipPath id="house-clip-lg">
      <path d="M 0,0 H 100 V 100 H 0 Z M 28,38 L 42,24 L 56,38 L 56,62 L 28,62 Z" fill-rule="evenodd"/>
    </clipPath>
    <clipPath id="house-clip-sm">
      <path d="M 0,0 H 60 V 60 H 0 Z M 16,22 L 26,12 L 36,22 L 36,40 L 16,40 Z" fill-rule="evenodd"/>
    </clipPath>
  </defs>
  <!-- Large red circle with house cutout -->
  <g transform="translate(2, 8)">
    <circle cx="28" cy="36" r="28" fill="#FF0000" clip-path="url(#house-clip-lg)"/>
  </g>
  <!-- Small red circle with house cutout -->
  <g transform="translate(30, 0)">
    <circle cx="22" cy="18" r="18" fill="#FF0000" clip-path="url(#house-clip-sm)"/>
  </g>
  <!-- SILL text -->
  <text x="68" y="60" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="48" fill="#1A1A1A" letter-spacing="-1">SILL</text>
  <!-- SA suffix -->
  <text x="210" y="60" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="20" fill="#1A1A1A">SA</text>
</svg>
